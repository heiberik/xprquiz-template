<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Koding med Claude Code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .label {
      text-transform: uppercase;
      letter-spacing: 0.3em;
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    h1 .highlight {
      background: linear-gradient(135deg, #d4a574, #c084fc, #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .presenter {
      font-size: 1.4rem;
      color: #aaa;
      margin-bottom: 3rem;
      font-weight: 300;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #555;
      font-size: 0.85rem;
    }

    .dot {
      width: 4px;
      height: 4px;
      background: #555;
      border-radius: 50%;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: #c084fc;
      margin-left: 4px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="label">Skillex 2026</p>
    <h1>
      <span class="highlight">Vibe Koding</span><br>
      med Claude Code<span class="cursor"></span>
    </h1>
    <p class="presenter">Henrik Heiberg</p>
    <div class="footer">
      <span>Anthropic</span>
      <span class="dot"></span>
      <span>Claude Code</span>
      <span class="dot"></span>
      <span>Live coding</span>
    </div>
  </div>
</body>
</html>
